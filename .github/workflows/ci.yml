name: CI Pipeline

on:
  push:
    branches: [ "*" ]
  pull_request:
    branches: [ main ]

jobs:
  backend-ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install UV
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Clear UV Cache
        run: uv cache clean

      - name: Sync Backend Dependencies
        run: |
          uv sync

      - name: (Placeholder) Backend Tests
        run: |
          # uv run pytest
          echo "No tests found. Add your backend tests to run here."

  frontend-ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies (Clean)
        run: |
          cd frontend
          npm cache clean --force
          npm ci

      - name: Build Check
        run: |
          cd frontend
          npm run build
