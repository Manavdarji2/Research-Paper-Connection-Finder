services:
  - type: web
    name: mcp-backend
    runtime: python
    buildCommand: "pip install -e ."
    startCommand: "uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.0
      - key: OPENROUTER_API_KEY
        sync: false # This will require user to set it in Render dashboard
      - key: VITE_API_BASE_URL
        sync: false
